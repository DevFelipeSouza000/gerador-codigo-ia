<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Código com IA</title>

    <link rel="stylesheet" href="styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
</head>

<body>

    <h1>Gerado por Felipe <span>com IA</span> ⚡</h1>

    <p>Descreva o que você imagina e veja a mágica acontecer</p>

    <textarea class="caixa-texto" rows="3" placeholder="Ex: botão vermelho com bordas arredondadas"></textarea>

    <button class="botao-gerar">Gerar Código ⚡</button>

    <div class="status"></div>

    <div class="container-saidas">
        <button class="botao-copiar">Copiar Código 📋</button>

        <iframe class="iframe-codigo"></iframe>
        <iframe class="resultado-codigo"></iframe>
    </div>

    <script src="scripts.js"></script>
</body>
</html>
